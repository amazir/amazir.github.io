	<style>
	<!--source pour carousel d'image: https://www.thecoderashok.com/blog/automatic-image-slider-in-html-css-only#google_vignette-->
			* {
		  margin: 0;
		  padding: 0;
		  box-sizing: border-box;
		  font-family: sans-serif;
		}
		body {
		  position: relative;
		  width: 100%;
		  height: 100vh;
		  display: flex;
		  justify-content: center;
		  align-items: center;
		}
		.slider_container {
		  position: relative;
		  width: 60%;
		  height: 40rem;
		  display: flex;
		  justify-content: flex-start;
		  align-items: center;
		  overflow: hidden;
		}
		.slider {
		  position: relative;
		  width: 400%;
		  height: 100%;
		  display: flex;
		  flex-direction: row;
		  align-items: center;
		  justify-content: space-between;
		  animation: 30s cubic-bezier(1, 0.95, 0.565, 1) sliding infinite;
		}
		.slide {
		  position: relative;
		  min-width: 100%;
		  height: 100%;
		}
		.slide img {
		  width: 100%;
		  height: 100%;
		}
		.slide .caption {
		  position: absolute;
		  left: 0;
		  bottom: 5%;
		  font-size: 5rem;
		  font-weight: 600;
		  color: white;
		  text-transform: capitalize;
		  background: rgba(0, 0, 0, 0.348);
		  backdrop-filter: blur(10px);
		  padding: 1rem 5rem;
		  border-radius: 0 2rem 2rem 0;
		}
		@keyframes sliding {
		  0% {
			transform: translateX(0%);
		  }
		  20% {
			transform: translateX(0%);
		  }
		  25% {
			transform: translateX(-100%);
		  }
		  45% {
			transform: translateX(-100%);
		  }
		  50% {
			transform: translateX(-200%);
		  }
		  70% {
			transform: translateX(-200%);
		  }
		  75% {
			transform: translateX(-300%);
		  }
		  95% {
			transform: translateX(-300%);
		  }
		  100% {
			transform: translateX(-400%);
		  }
		}
	</style>
